<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สวนจำลอง</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f5f5f5;
        }

        header {
            background: #2e7d32;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 10px 0;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        img {
            width: 100%;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<header>
    <h1>🌿 สวนจำลอง</h1>
    <p>แหล่งเรียนรู้และพักผ่อน</p>
</header>

<div class="container">

    <div class="card">
        <h2>เกี่ยวกับสวน</h2>
        <p>สวนจำลองเป็นพื้นที่สำหรับศึกษาและพักผ่อน เหมาะสำหรับทุกวัย</p>
    </div>

    <div class="card">
        <h2>ภาพบรรยากาศ</h2>
        <img src="https://picsum.photos/800/400" alt="สวน">
    </div>

    <div class="card">
        <h2>ติดต่อ</h2>
        <p>โทร: 08X-XXX-XXXX</p>
    </div>

</div>

</body>
</html>
